<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<title>Mustaqillik hududi – Jadval va Xarita</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
}
h2{
  text-align:center;
  margin:10px 0;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:14px;
}
th, td{
  border:1px solid #999;
  padding:6px;
}
th{
  background:#f0f0f0;
}
tr:hover{
  background:#e6f2ff;
}
#map{
  width:100%;
  height:60vh;
}
</style>
</head>
<body>

<h2>Joylar jadvali</h2>

<table>
<thead>
<tr>
  <th>#</th>
  <th>Manzil</th>
  <th>Kenglik</th>
  <th>Uzunlik</th>
  <th>Raqam</th>
</tr>
</thead>
<tbody id="tableBody"></tbody>
</table>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
const points = [
 ["Мухаббат Мустакиллик кучаси 3/13 уй олди",41.217466,61.316885,"111 250 441 660"],
 ["Мустакиллик кучаси 3/20 уй",41.214562,61.315361,"111 250 448 974"],
 ["Халклар дустлиги кучаси 3/7 уй олди",41.220243,61.316333,"111 250 453 363"],
 ["Халклар дустлиги кучаси",41.220796,61.314037,"111 250 442 033"],
 ["К.Атаниезов кучаси",41.219710,61.310915,"111 250 442 547"],
 ["К.Атаниезов кучаси 3/3-уй олди",41.217674,61.312189,"111 250 437 515"],
 ["К.Атаниёзов кучаси солик идораси олди",41.217995,61.312299,"111 250 453 320"],
 ["Навкирон кучаси 3/15 уй олди",41.221495,61.311142,"111 250 442 605"],
 ["Исаев кучаси юздан таниб оли",41.220569,61.310514,"111 250 438 248"],
 ["Исаев кучаси боллар уйингохи",41.216104,61.308710,"111 250 452 793"],
 ["Халклар дустлиги кучаси",41.218551,61.309850,"111 250 452 647"],
 ["Мустакиллик кучаси",41.214738,61.314420,"111 250 442 882"],
 ["Халклар дустлиги, Арчазор чорраха",41.228836,61.270290,"111 250 453 390"],
 ["Арчазор кучаси охири",41.228846,61.280873,"111 250 452 770"],
 ["Арчазор, Нурафшон чорраха",41.226380,61.291131,"111 250 453 282"],
 ["Киробот, Настарин чорраха",41.227200,61.290699,"111 250 448 198"],
 ["Киробот кучаси охири",41.232539,61.267193,"111 250 452 799"],
 ["20 сон мактаб",41.236042,61.271548,"111 250 453 369"],

 ["К.Отаниязов кучаси охири",41.246389,61.271144,"111 250 452 778"]
];

// Jadval
const tbody = document.getElementById("tableBody");


// Xarita
const map = L.map('map').setView([41.225,61.29],13);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
 attribution:'&copy; OpenStreetMap'
}).addTo(map);

// Markerlar
points.forEach((p,i)=>{
  L.marker([p[1],p[2]])
    .addTo(map)
    .bindPopup(`<b>${i+1}. ${p[0]}</b><br>${p[3]}`);
});
</script>

</body>
</html>
